<div class="login-page">
  <div class="login-page__brand">
    <div class="login-page__bg"></div>
    <div class="login-page__brand-content">
      <a routerLink="/" class="login-logo">
        <img src="/images/logo.png" alt="OPTIMAT" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span class="gradient-text" style="display:none;font-family:var(--font-heading);font-size:2rem;font-weight:700">OPTIMAT</span>
      </a>
      <h2>Administration</h2>
      <p>Gérez le contenu de votre site web OPTIMAT Incorporation depuis cette interface sécurisée.</p>
    </div>
  </div>

  <div class="login-page__form">
    <div class="login-card">
      <div class="login-card__header">
        <h2>Connexion</h2>
        <p>Entrez vos identifiants pour accéder à l'administration.</p>
      </div>

      @if (error()) {
        <div class="alert alert-error">{{ error() }}</div>
      }

      <form (ngSubmit)="login()" #loginForm="ngForm" novalidate>
        <div class="form-group">
          <label for="email">Adresse email</label>
          <input id="email" type="email" class="form-control" [(ngModel)]="credentials.email"
                 name="email" placeholder="admin@optimat.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input id="password" type="password" class="form-control" [(ngModel)]="credentials.password"
                 name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:8px"
                [disabled]="loginForm.invalid || loading()">
          @if (loading()) { Connexion en cours... }
          @else { Se connecter }
        </button>
      </form>

      <div class="login-card__footer">
        <a routerLink="/">← Retour au site</a>
      </div>
    </div>
  </div>
</div>
